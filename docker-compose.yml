version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wahu-collections-db
    environment:
      POSTGRES_USER: wahu
      POSTGRES_PASSWORD: wahu_collections_2026
      POSTGRES_DB: collections
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wahu"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wahu-collections-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
